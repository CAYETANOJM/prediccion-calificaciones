<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predicci&oacute;n de Math Score</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f3f6fa;
            color: #222;
        }

        .contenedor {
            max-width: 540px;
            margin: 40px auto;
            padding: 24px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 24px;
            text-align: center;
            color: #1f2937;
        }

        .texto {
            margin: 0 0 22px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        form {
            display: grid;
            gap: 14px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        input,
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #bbb;
            border-radius: 4px;
            font-size: 14px;
            background: #fff;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            margin-top: 8px;
            padding: 11px;
            border: none;
            border-radius: 4px;
            background: #2563eb;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            opacity: 0.7;
            cursor: wait;
        }

        #resultado {
            margin-top: 18px;
            padding: 12px;
            border-radius: 4px;
            background: #eef4ff;
            border: 1px solid #c9d8ff;
            text-align: center;
            font-weight: bold;
            color: #1e3a8a;
        }

        #resultado.error {
            background: #fff0f0;
            border-color: #ffc2c2;
            color: #9f1239;
        }

        @media (max-width: 600px) {
            .contenedor {
                margin: 20px 12px;
                padding: 20px;
            }
        }
    </style>
    <script>
        function predecirMathScore(event) {
            event.preventDefault();

            const form = event.target;
            const button = form.querySelector("button");
            const resultado = document.getElementById("resultado");
            const formData = new URLSearchParams(new FormData(form));

            button.disabled = true;
            button.innerText = "Calculando...";
            resultado.className = "";
            resultado.innerText = "Procesando prediccion...";

            fetch("/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded",
                },
                body: formData.toString(),
            })
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        resultado.className = "error";
                        resultado.innerText = "Error: " + data.error;
                        return;
                    }

                    resultado.className = "";
                    resultado.innerText = data.mensaje;
                })
                .catch(error => {
                    resultado.className = "error";
                    resultado.innerText = "Error en la solicitud.";
                    console.error("Error:", error);
                })
                .finally(() => {
                    button.disabled = false;
                    button.innerText = "Predecir";
                });
        }
    </script>
</head>
<body>
    <main class="contenedor">
        <h1>Predicci&oacute;n de Math Score</h1>
        <p class="texto">Completa el formulario para estimar la calificaci&oacute;n de matem&aacute;ticas.</p>

        <form onsubmit="predecirMathScore(event)">
            <div>
                <label for="gender">Genero</label>
                <select id="gender" name="gender" required>
                    <option value="female">female</option>
                    <option value="male">male</option>
                </select>
            </div>

            <div>
                <label for="race_ethnicity">Race/Ethnicity</label>
                <select id="race_ethnicity" name="race_ethnicity" required>
                    <option value="group A">group A</option>
                    <option value="group B">group B</option>
                    <option value="group C">group C</option>
                    <option value="group D">group D</option>
                    <option value="group E">group E</option>
                </select>
            </div>

            <div>
                <label for="parental_level_of_education">Nivel educativo de los padres</label>
                <select id="parental_level_of_education" name="parental_level_of_education" required>
                    <option value="some high school">some high school</option>
                    <option value="high school">high school</option>
                    <option value="some college">some college</option>
                    <option value="associate's degree">associate's degree</option>
                    <option value="bachelor's degree">bachelor's degree</option>
                    <option value="master's degree">master's degree</option>
                </select>
            </div>

            <div>
                <label for="lunch">Lunch</label>
                <select id="lunch" name="lunch" required>
                    <option value="standard">standard</option>
                    <option value="free/reduced">free/reduced</option>
                </select>
            </div>

            <div>
                <label for="test_preparation_course">Curso de preparacion</label>
                <select id="test_preparation_course" name="test_preparation_course" required>
                    <option value="none">none</option>
                    <option value="completed">completed</option>
                </select>
            </div>

            <div>
                <label for="reading_score">Reading score</label>
                <input id="reading_score" name="reading_score" type="number" min="0" max="100" step="1" value="72" required>
            </div>

            <div>
                <label for="writing_score">Writing score</label>
                <input id="writing_score" name="writing_score" type="number" min="0" max="100" step="1" value="74" required>
            </div>

            <button type="submit">Predecir</button>
        </form>

        <div id="resultado">Aun no hay prediccion.</div>
    </main>
</body>
</html>
